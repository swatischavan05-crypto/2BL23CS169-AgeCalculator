<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Age Calculator</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

.container{
    width:400px;
    background:white;
    padding:30px;
    margin:auto;
    margin-top:80px;
    border-radius:15px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h1>Age Calculator</h1>

<form action="AgeServlet" method="post">

<label>Enter Your Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

<label>Birth Year</label>
<input type="number" name="year" placeholder="YYYY" required>

<label>Birth Month</label>
<input type="number" name="month" min="1" max="12" placeholder="MM" required>

<label>Birth Day</label>
<input type="number" name="day" min="1" max="31" placeholder="DD" required>

<button type="submit">Calculate Age</button>

</form>

</div>

</body>
</html>
